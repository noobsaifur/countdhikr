# Project-wide Gradle settings
# Copy this file to android/gradle.properties if needed

# Fix platform encoding issues
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Dconsole.encoding=UTF-8

# Android settings
android.useAndroidX=true
android.enableJetifier=true

# Kotlin settings
kotlin.code.style=official

# Build performance
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# Disable daemon for CI builds (optional, uncomment for CI)
# org.gradle.daemon=false

# Note: JAVA_HOME is automatically detected from your environment.
# If you need to override, set it in your system environment variables
# or uncomment and modify the line below:
# org.gradle.java.home=/path/to/your/java-17
