name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      JAVA_VERSION: 17
      NODE_VERSION: 24

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        accept-android-sdk-licenses: false
        cmdline-tools-version: 14742923
        packages: 'tools platform-tools build-tools;36.0.0 platforms;android-36'

    - name: Install npm dependencies
      run: npm install --legacy-peer-deps

    - name: Update Capacitor dependencies
      run: |
        npm update @capacitor/android @capacitor/core
        echo "✓ Updated Capacitor dependencies"

    - name: Build web assets
      run: npm run build

    # CRITICAL: Clean up stale Android platform to prevent conflicts
    - name: Remove stale Android platform
      run: |
        rm -rf android/
        echo "✓ Removed stale Android platform directory"

    # Add fresh Android platform
    - name: Add Android platform
      run: |
        npx cap add android
        echo "✓ Added fresh Android platform"

    - name: Sync Capacitor
      run: npx cap sync android

    # Update Gradle wrapper to Gradle 8.10.2 (compatible with Java 17, avoids Gradle 9.0 deprecation)
    - name: Update Gradle wrapper
      working-directory: android
      run: |
        # Update gradle-wrapper.properties to use Gradle 8.10.2
        sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.10.2-bin.zip|g' gradle/wrapper/gradle-wrapper.properties
        echo "✓ Updated Gradle wrapper to 8.10.2"
        echo "Gradle wrapper properties:"
        cat gradle/wrapper/gradle-wrapper.properties | grep distributionUrl

    # Configure Gradle with proper memory and Java settings
    - name: Configure Gradle properties
      working-directory: android
      run: |
        echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8" >> gradle.properties
        echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.warning.mode=summary" >> gradle.properties
        cat gradle.properties

    # Update build.gradle for Java 17 compatibility
    - name: Update build.gradle for Java 17
      working-directory: android
      run: |
        # Replace JavaVersion enum constants
        sed -i 's/JavaVersion.VERSION_11/JavaVersion.VERSION_17/g' app/build.gradle || true
        sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' app/build.gradle || true
        
        # Replace jvmTarget settings
        sed -i 's/jvmTarget = "11"/jvmTarget = "17"/g' app/build.gradle || true
        sed -i 's/jvmTarget = "21"/jvmTarget = "17"/g' app/build.gradle || true
        
        # Replace sourceCompatibility and targetCompatibility
        sed -i 's/sourceCompatibility = 21/sourceCompatibility = 17/g' app/build.gradle || true
        sed -i 's/targetCompatibility = 21/targetCompatibility = 17/g' app/build.gradle || true
        sed -i 's/sourceCompatibility = 11/sourceCompatibility = 17/g' app/build.gradle || true
        sed -i 's/targetCompatibility = 11/targetCompatibility = 17/g' app/build.gradle || true
        
        # Replace bare numeric versions in quotes (fallback for unknown patterns)
        sed -i 's/"21"/"17"/g' app/build.gradle || true
        sed -i "s/'21'/'17'/g" app/build.gradle || true
        
        # Ensure UTF-8 encoding is set for all compile tasks (prevent Gradle deprecation warnings)
        if ! grep -q "tasks.withType.*AbstractCompile" app/build.gradle; then
            echo 'tasks.withType(org.gradle.api.tasks.compile.AbstractCompile) {' >> app/build.gradle
            echo '    options.encoding = "UTF-8"' >> app/build.gradle
            echo '}' >> app/build.gradle
            echo "✓ Added UTF-8 encoding configuration to app/build.gradle"
        fi
        
        echo "✓ Updated all Java version references to 17 in build.gradle"
        echo "Verification:"
        grep -i "JavaVersion\|jvmTarget\|sourceCompatibility\|targetCompatibility" app/build.gradle | head -20 || true

    # Make gradlew executable
    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    # Clean Gradle cache to remove corrupted artifacts
    - name: Clean Gradle cache
      working-directory: android
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      run: |
        ./gradlew clean
        echo "✓ Cleaned Gradle cache"

    # Build Debug APK with detailed logging
    - name: Build Debug APK
      working-directory: android
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode=summary

    # Upload APK artifact
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    # Upload build reports on failure
    - name: Upload build reports on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: android/build/reports/
        retention-days: 7
