name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      JAVA_VERSION: '21'
      NODE_VERSION: '24'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        accept-android-sdk-licenses: false

    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Install npm dependencies
      run: npm install --legacy-peer-deps

    - name: Build web assets
      run: npm run build

    # Sync Capacitor assets to the committed android platform directory
    - name: Sync Capacitor
      run: npx cap sync android

    # Configure Gradle with proper memory and Java settings
    - name: Configure Gradle properties
      working-directory: android
      run: |
        echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8" >> gradle.properties
        echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # Make gradlew executable
    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    # Clean Gradle cache
    - name: Clean Gradle cache
      working-directory: android
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      run: ./gradlew clean

    # Build Debug APK
    - name: Build Debug APK
      working-directory: android
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    # Build Release APK
    - name: Build Release APK
      working-directory: android
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    # Upload Debug APK artifact
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    # Upload Release APK artifact
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 7

    # Upload build reports on failure
    - name: Upload build reports on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: android/build/reports/
        retention-days: 7
